<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿助首爾行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function showDay(day) {
            document.querySelectorAll('.day-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('day-' + day).classList.remove('hidden');
        }
    </script>
</head>
<body class="bg-gray-50 p-4 max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-4 text-center">阿助首爾三天兩夜</h1>

    <!-- 日期切換按鈕 -->
    <div class="flex space-x-2 mb-4">
        <button onclick="showDay('14')" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm">8/14(五)</button>
        <button onclick="showDay('15')" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm">8/15(六)</button>
        <button onclick="showDay('16')" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm">8/16(日)</button>
    </div>

    <!-- 內容區域 -->
    <div id="day-14" class="day-content">
        <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200">
            <h2 class="font-bold">✈️ 抵達首爾</h2>
            <p class="text-sm">抵達仁川 T2，搭乘機場巴士直達明洞。</p>
        </div>
    </div>
    
    <div id="day-15" class="day-content hidden">
        <div class="bg-white p-4 rounded-xl shadow">
            <h2 class="font-bold">🍴 美食購物日</h2>
            <p class="text-sm mt-2">• 明洞餃子 (站號 424)</p>
            <p class="text-sm">• 荒謬的生肉 (18,800 KRW)</p>
        </div>
    </div>

    <div id="day-16" class="day-content hidden">
        <div class="bg-white p-4 rounded-xl shadow">
            <h2 class="font-bold">🛍️ 採買返程</h2>
            <p class="text-sm mt-2">• 首爾站樂天 Mart 補貨</p>
            <p class="text-sm">• 搭巴士前往 T2，使用 Smart Pass</p>
        </div>
    </div>
</body>
</html>
