<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的優惠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans h-screen flex flex-col max-w-md mx-auto shadow-2xl">

    <header class="bg-blue-600 text-white p-4 pt-6 shadow-md z-50">
        <h1 class="text-xl font-bold tracking-wider" id="page-title">我的優惠</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-28" id="dynamic-content">
        <div class="text-center py-10">資料載入中...</div>
    </main>

    <nav class="bg-white border-t fixed bottom-0 w-full max-w-md flex justify-between px-6 py-3 shadow-lg z-50">
        <button onclick="switchTab('food')" class="flex flex-col items-center text-blue-600"><i class="fas fa-utensils"></i><span class="text-[10px]">美食</span></button>
        <button onclick="switchTab('hotel')" class="flex flex-col items-center text-gray-400"><i class="fas fa-hotel"></i><span class="text-[10px]">住房</span></button>
        <button onclick="switchTab('lounge')" class="flex flex-col items-center text-gray-400"><i class="fas fa-couch"></i><span class="text-[10px]">貴賓室</span></button>
        <button onclick="switchTab('news')" class="flex flex-col items-center text-gray-400"><i class="fas fa-newspaper"></i><span class="text-[10px]">新聞</span></button>
    </nav>

    <script>
        const DATA_URL = 'data.json?t=' + Date.now();
        let globalData = {};

        async function init() {
            try {
                const res = await fetch(DATA_URL);
                globalData = await res.json();
                switchTab('food');
            } catch(e) { document.getElementById('dynamic-content').innerHTML = "載入失敗"; }
        }

        function switchTab(tab) {
            const container = document.getElementById('dynamic-content');
            if (tab === 'lounge') {
                const countries = Object.keys(globalData.lounge || {});
                container.innerHTML = `
                    <select id="c" onchange="updateAirport()" class="w-full p-3 border rounded-xl"><option value="">選擇國家</option>${countries.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                    <select id="a" onchange="showLounge()" class="w-full p-3 border rounded-xl mt-3"><option value="">選擇機場</option></select>
                    <div id="result" class="mt-4"></div>
                `;
            } else if (tab === 'food') {
                container.innerHTML = (globalData['6']?.food || []).map(i => `<div class="bg-white p-4 rounded-xl shadow">${i.title}</div>`).join('');
            } else {
                container.innerHTML = "其他分頁建置中...";
            }
        }

        function updateAirport() {
            const country = document.getElementById('c').value;
            const select = document.getElementById('a');
            const airports = Object.keys(globalData.lounge[country] || {});
            select.innerHTML = '<option value="">選擇機場</option>' + airports.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function showLounge() {
            const c = document.getElementById('c').value;
            const a = document.getElementById('a').value;
            const imgUrl = globalData.lounge[c][a];
            document.getElementById('result').innerHTML = `<img src="${imgUrl}" class="w-full rounded-xl shadow-lg">`;
        }

        init();
    </script>
</body>
</html>
