<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的生活整合中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 h-screen flex flex-col max-w-md mx-auto">
    <header class="bg-blue-600 text-white p-4 pt-8 shadow-md">
        <h1 class="text-xl font-bold">我的整合中心</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24" id="dynamic-content">
        </main>

    <nav class="bg-white border-t fixed bottom-0 w-full max-w-md flex justify-around py-3 shadow-lg z-50">
        <button onclick="renderSection('6')" class="text-xs font-bold text-gray-500">優惠</button>
        <button onclick="renderNews()" class="text-xs font-bold text-gray-500">新聞</button>
        <button onclick="renderLounge()" class="text-xs font-bold text-gray-500">貴賓室</button>
    </nav>

    <script>
        let globalData = {};
        fetch('data.json?t=' + Date.now()).then(r => r.json()).then(d => { globalData = d; renderSection('6'); });

        function renderSection(month) {
            const container = document.getElementById('dynamic-content');
            const items = globalData[month]?.food || [];
            container.innerHTML = items.map(i => `<div class="bg-white p-4 rounded shadow mb-2">${i.title}</div>`).join('');
        }

        function renderNews() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = (globalData.news || []).map(i => 
                `<div class="bg-white p-4 rounded shadow mb-2 text-sm font-bold">${i.title}<br><a href="${i.url}" class="text-blue-500 text-xs">閱讀原文</a></div>`
            ).join('');
        }

        function renderLounge() {
            const container = document.getElementById('dynamic-content');
            const lounge = globalData.lounge || {};
            container.innerHTML = `
                <select id="c" onchange="updateA()" class="w-full p-2 border rounded"><option>選國家</option>${Object.keys(lounge).map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                <select id="a" onchange="showI()" class="w-full p-2 border rounded mt-2"><option>選機場</option></select>
                <div id="imgZone" class="mt-4"></div>
            `;
        }

        function updateA() {
            const c = document.getElementById('c').value;
            const a = document.getElementById('a');
            a.innerHTML = Object.keys(globalData.lounge[c] || {}).map(i => `<option value="${i}">${i}</option>`).join('');
        }

        function showI() {
            const c = document.getElementById('c').value;
            const a = document.getElementById('a').value;
            document.getElementById('imgZone').innerHTML = `<img src="${globalData.lounge[c][a]}" class="w-full rounded">`;
        }
    </script>
</body>
</html>
