<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的優惠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="data.js"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col max-w-md mx-auto shadow-2xl">
    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50">
        <h1 class="text-xl font-bold">我的優惠</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4" id="main-content">
        <div id="dynamic-content" class="space-y-4"></div>
    </main>

    <nav class="bg-white border-t flex justify-around p-4 shadow-lg z-50">
        <button onclick="renderActiveTab()" class="text-gray-500"><i class="fas fa-list"></i><br><span class="text-xs">優惠</span></button>
        <button onclick="renderHotelUI()" class="text-orange-600 font-bold"><i class="fas fa-bed"></i><br><span class="text-xs">比價</span></button>
    </nav>

    <script>
        let activeHotelRegion = 'tokyo';

        function renderHotelUI() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input type="date" id="checkInInput" class="border p-2 rounded">
                    <input type="date" id="checkOutInput" class="border p-2 rounded">
                </div>
                <div class="flex gap-2 overflow-x-auto pb-2 mb-4">
                    ${Object.keys(hotelsData).map(r => `
                        <button onclick="activeHotelRegion='${r}'; renderHotelList()" class="px-4 py-2 rounded-lg border ${activeHotelRegion===r?'bg-blue-600 text-white':'bg-white'}">${r.toUpperCase()}</button>
                    `).join('')}
                </div>
                <div id="hotelListContainer" class="space-y-3"></div>
            `;
            renderHotelList();
        }

        function renderHotelList() {
            const list = document.getElementById('hotelListContainer');
            const cin = document.getElementById('checkInInput').value;
            const cout = document.getElementById('checkOutInput').value;
            const hotels = hotelsData[activeHotelRegion] || [];
            
            list.innerHTML = hotels.map(h => `
                <div class="bg-white p-4 rounded-xl shadow border">
                    <h3 class="font-bold mb-2">${h.name}</h3>
                    <a href="https://tw.trip.com/hotels/detail/?hotelId=${h.id}&checkIn=${cin}&checkOut=${cout}&Allianceid=7364995&SID=277926202" 
                       target="_blank" class="block w-full text-center bg-blue-600 text-white py-2 rounded-lg text-sm">前往查價</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
