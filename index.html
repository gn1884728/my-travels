<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的優惠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .c-btn-shadow { box-shadow: 0 -4px 10px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 font-sans h-screen flex flex-col max-w-md mx-auto shadow-2xl relative pb-safe">

    <header class="bg-blue-600 text-white px-4 py-3 flex flex-col sticky top-0 z-50 shadow-md pt-6">
        <div class="flex justify-between items-center w-full mb-2">
            <h1 class="text-xl font-bold tracking-wider">我的優惠</h1>
            <div class="relative" id="monthSelectorContainer">
                <select id="monthSelect" onchange="renderActiveTab()" class="bg-white text-gray-800 text-sm font-semibold rounded-lg px-3 py-1.5 pr-8 appearance-none cursor-pointer border border-gray-200 focus:outline-none shadow-sm">
                    <option value="6" selected>6 月</option>
                    </select>
            </div>
        </div>
        <div id="notice-banner" class="w-full text-xs py-1.5 px-2.5 rounded-md font-medium flex items-center shadow-inner bg-blue-500/50 text-blue-100">
            <i class="fas fa-info-circle mr-1.5"></i>
            <span id="notice-text">切換至「住房比價」即可設定日期</span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-28 no-scrollbar" id="main-content">
        <div id="dynamic-content" class="space-y-4"></div>
    </main>

    <nav class="bg-white border-t border-gray-200 fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-between items-end pb-3 pt-2 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.1)] z-50 px-4 h-[72px]">
        <button onclick="switchTab('food')" class="tab-btn flex flex-col items-center w-12 text-gray-400"><i class="fas fa-utensils text-lg"></i><span class="text-[10px]">美食</span></button>
        <button onclick="switchTab('life')" class="tab-btn flex flex-col items-center w-12 text-gray-400"><i class="fas fa-shopping-bag text-lg"></i><span class="text-[10px]">生活</span></button>
        <div class="relative w-16 flex justify-center">
            <button onclick="switchTab('hotel')" id="tab-hotel" class="absolute -bottom-2 flex flex-col items-center justify-center w-16 h-16 bg-orange-500 rounded-full c-btn-shadow border-4 border-gray-50 text-white z-50">
                <i class="fas fa-bed text-xl"></i><span class="text-[10px] font-bold">比價</span>
            </button>
        </div>
        <button onclick="switchTab('travel')" class="tab-btn flex flex-col items-center w-12 text-gray-400"><i class="fas fa-plane text-lg"></i><span class="text-[10px]">旅遊</span></button>
        <button onclick="switchTab('credit')" class="tab-btn flex flex-col items-center w-12 text-gray-400"><i class="fas fa-credit-card text-lg"></i><span class="text-[10px]">信用卡</span></button>
    </nav>

    <script src="data.js"></script>
    <script>
        let currentTab = 'food';
        let activeHotelRegion = 'tokyo';
        
        // 日期預設
        const d1 = new Date(); d1.setDate(d1.getDate()+1);
        const d2 = new Date(); d2.setDate(d2.getDate()+2);
        let checkInDate = d1.toISOString().split('T')[0];
        let checkOutDate = d2.toISOString().split('T')[0];

        function getTripUrl(hotelId) {
            return `https://tw.trip.com/hotels/detail/?hotelId=${hotelId}&checkIn=${checkInDate}&checkOut=${checkOutDate}&Allianceid=7364995&SID=277926202`;
        }

        function switchTab(tab) {
            currentTab = tab;
            const isHotel = (tab === 'hotel');
            document.getElementById('monthSelectorContainer').style.display = isHotel ? 'none' : 'block';
            if(isHotel) renderHotelUI(); else renderActiveTab();
        }

        function renderHotelUI() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = `
                <div class="bg-white p-4 rounded-xl shadow-sm border mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <input type="date" value="${checkInDate}" onchange="checkInDate=this.value" class="border p-2 rounded">
                        <input type="date" value="${checkOutDate}" onchange="checkOutDate=this.value" class="border p-2 rounded">
                    </div>
                </div>
                <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                    ${Object.keys(hotelsData).map(r => `
                        <button onclick="activeHotelRegion='${r}'; renderHotelUI()" class="px-4 py-2 rounded-lg border ${activeHotelRegion===r?'bg-blue-600 text-white':'bg-white'}">${r.toUpperCase()}</button>
                    `).join('')}
                </div>
                <div id="hotelListContainer" class="space-y-3"></div>
            `;
            renderHotelList();
        }

        function renderHotelList() {
            const list = document.getElementById('hotelListContainer');
            const hotels = hotelsData[activeHotelRegion] || [];
            list.innerHTML = hotels.map(h => `
                <div class="bg-white p-4 rounded-xl shadow border">
                    <h3 class="font-bold mb-2">${h.name}</h3>
                    <a href="${getTripUrl(h.id)}" target="_blank" class="block w-full text-center bg-blue-600 text-white py-2 rounded-lg">前往查價</a>
                </div>
            `).join('');
        }

        // 其他 renderActiveTab() 與 fetchGitHubData() 邏輯請保留你原有的
    </script>
</body>
</html>
