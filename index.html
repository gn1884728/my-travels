<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>優惠</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 max-w-md mx-auto h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 font-bold text-center">優惠</header>
    <main id="app" class="flex-1 p-4 overflow-y-auto pb-24"></main>
    <nav class="bg-white border-t flex justify-around p-4 shadow-lg fixed bottom-0 w-full max-w-md">
        <button onclick="render('food')">優惠</button>
        <button onclick="render('travel')">行程</button>
        <button onclick="render('lounge')">貴賓室</button>
    </nav>

    <script>
        let d = {};
        fetch('data.json?t='+Date.now()).then(r=>r.json()).then(res=>{ d=res; render('food'); });

        function render(tab) {
            const app = document.getElementById('app');
            if(tab === 'food') {
                app.innerHTML = d.food.map(i => `
                    <div class="bg-white p-4 rounded-xl shadow mb-3">
                        <span class="${i.color} text-white px-2 py-1 rounded text-xs font-bold">${i.brand}</span>
                        <p class="font-bold my-2">${i.title}</p>
                        <p class="text-xs text-gray-500 mb-3">${i.time}</p>
                        <div class="flex gap-2">
                            <a href="${i.url}" class="bg-blue-600 text-white p-2 rounded flex-1 text-center font-bold text-sm">前往優惠</a>
                            <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=${i.title}" target="_blank" class="bg-gray-200 p-2 rounded px-4 text-sm font-bold text-gray-700">+日曆</a>
                        </div>
                    </div>`).join('');
            } else if(tab === 'travel') {
                app.innerHTML = d.travel.map(i => `<a href="${i.url}" class="block bg-white p-4 rounded-xl shadow mb-3 font-bold">${i.title}</a>`).join('');
            } else {
                app.innerHTML = `
                    <select id="c" onchange="u('ci', Object.keys(d.lounge[this.value]))" class="w-full p-3 border rounded mb-2"><option>選擇國家</option>${Object.keys(d.lounge).map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
                    <select id="ci" onchange="u('a', Object.keys(d.lounge[document.getElementById('c').value][this.value]))" class="w-full p-3 border rounded mb-2"><option>選擇城市</option></select>
                    <select id="a" onchange="u('m', Object.keys(d.lounge[document.getElementById('c').value][document.getElementById('ci').value][this.value]))" class="w-full p-3 border rounded mb-2"><option>選擇機場</option></select>
                    <select id="m" onchange="show()" class="w-full p-3 border rounded mb-2"><option>選擇會籍</option></select>
                    <div id="r"></div>`;
            }
        }
        function u(id, keys) { document.getElementById(id).innerHTML = `<option>選擇</option>` + keys.map(k=>`<option value="${k}">${k}</option>`).join(''); }
        function show() {
            const s = d.lounge[document.getElementById('c').value][document.getElementById('ci').value][document.getElementById('a').value][document.getElementById('m').value][0];
            document.getElementById('r').innerHTML = `<div class="bg-white p-4 rounded-xl shadow"><h3 class="font-bold">${s.name}</h3><p class="text-sm my-2 text-gray-600">${s.desc}</p><img src="${s.img}" class="w-full rounded-lg"></div>`;
        }
    </script>
</body>
</html>
