<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的優惠</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4">住房比價</h1>
        <div id="hotel-list" class="space-y-4"></div>
    </div>

    <script>
        // 將網址簡化，去掉會導致解析卡死的複雜查詢參數
        const hotels = [
            { name: "東橫INN - 上野田原町站", url: "https://tw.trip.com/hotels/detail/?hotelId=688581" },
            { name: "相鐵 FRESA INN - 東新宿站前", url: "https://hk.trip.com/hotels/detail/?hotelId=688315" }
        ];

        const list = document.getElementById('hotel-list');
        hotels.forEach(h => {
            list.innerHTML += `<div class="bg-white p-4 rounded shadow">
                <div class="font-bold mb-2">${h.name}</div>
                <a href="${h.url}" target="_blank" class="text-blue-500 underline">前往查價</a>
            </div>`;
        });
    </script>
</body>
</html>
