<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的優惠</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .c-btn-shadow { box-shadow: 0 -4px 10px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 font-sans h-screen flex flex-col max-w-md mx-auto shadow-2xl relative pb-safe">

    <header class="bg-blue-600 text-white px-4 py-3 flex flex-col sticky top-0 z-50 shadow-md pt-6">
        <div class="flex justify-between items-center w-full mb-2">
            <h1 class="text-xl font-bold tracking-wider">我的優惠</h1>
            <select id="monthSelect" onchange="trackMonthChange()" class="bg-white text-gray-800 text-sm font-semibold rounded-lg px-3 py-1.5 pr-8 appearance-none cursor-pointer border border-gray-200 focus:outline-none">
                <option value="6" selected>6 月</option><option value="7">7 月</option><option value="8">8 月</option>
            </select>
        </div>
        <div id="notice-banner" class="w-full text-xs py-1.5 px-2.5 rounded-md font-medium flex items-center shadow-inner bg-blue-100 text-blue-800">
            <i class="fas fa-info-circle mr-1.5"></i> <span id="notice-text">請選擇住宿日期並按「搜尋」</span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-28 no-scrollbar" id="main-content">
        <div id="dynamic-content" class="space-y-4"></div>
    </main>

    <nav class="bg-white border-t border-gray-200 fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-between items-end pb-3 pt-2 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.1)] z-50 px-4 h-[72px]">
        <button onclick="switchTab('food')" class="tab-btn flex flex-col items-center space-y-1 w-12 text-blue-600 font-semibold"><i class="fas fa-utensils text-lg"></i><span class="text-[10px]">美食</span></button>
        <button onclick="switchTab('life')" class="tab-btn flex flex-col items-center space-y-1 w-12 text-gray-400"><i class="fas fa-shopping-bag text-lg"></i><span class="text-[10px]">生活</span></button>
        <div class="relative w-16 flex justify-center">
            <button onclick="switchTab('hotel')" id="tab-hotel" class="absolute -bottom-2 flex flex-col items-center justify-center w-16 h-16 bg-blue-600 rounded-full c-btn-shadow border-4 border-gray-50 text-white z-50"><i class="fas fa-bed text-xl mb-0.5"></i><span class="text-[10px] font-bold">比價</span></button>
        </div>
        <button onclick="switchTab('travel')" class="tab-btn flex flex-col items-center space-y-1 w-12 text-gray-400"><i class="fas fa-plane text-lg"></i><span class="text-[10px]">旅遊</span></button>
        <button onclick="switchTab('credit')" class="tab-btn flex flex-col items-center space-y-1 w-12 text-gray-400"><i class="fas fa-credit-card text-lg"></i><span class="text-[10px]">信用卡</span></button>
    </nav>

    <script>
        const baseHotelsData = [
            { region: 'tokyo', name: '東橫INN - 上野田原町站', platform: 'TRIP', basePrice: 2500, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Tokyo&cityId=228&hotelId=688581&Allianceid=7364995&SID=277926202' },
            { region: 'tokyo', name: '相鐵 FRESA INN - 東新宿站前', platform: 'TRIP', basePrice: 3500, url: 'https://hk.trip.com/hotels/detail/?cityEnName=Tokyo&cityId=228&hotelId=688315&Allianceid=7364995&SID=277926202' },
            { region: 'tokyo', name: '東京上野喜來登福朋飯店', platform: 'TRIP', basePrice: 5800, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Tokyo&cityId=228&hotelId=1458598&Allianceid=7364995&SID=277926202' },
            { region: 'fukuoka', name: 'lyf 天神福岡飯店', platform: 'TRIP', basePrice: 2200, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Fukuoka&cityId=248&hotelId=72229900&Allianceid=7364995&SID=277926202' },
            { region: 'fukuoka', name: '福岡日航飯店', platform: 'TRIP', basePrice: 4500, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Fukuoka&cityId=248&hotelId=993535&Allianceid=7364995&SID=277926202' },
            { region: 'osaka', name: '大阪都喜來登飯店', platform: 'TRIP', basePrice: 5200, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Osaka&cityId=219&hotelId=993284&Allianceid=7364995&SID=277926202' },
            { region: 'osaka', name: '東橫 INN - 大阪難波', platform: 'TRIP', basePrice: 2100, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Osaka&cityId=219&hotelId=124671917&Allianceid=7364995&SID=277926202' },
            { region: 'sapporo', name: 'Vessel Inn 札幌中島公園飯店', platform: 'TRIP', basePrice: 3200, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Sapporo&cityId=641&hotelId=705328&Allianceid=7364995&SID=277926202' },
            { region: 'sapporo', name: '洲至奢選洞爺溫莎飯店', platform: 'TRIP', basePrice: 12500, url: 'https://tw.trip.com/hotels/detail/?cityEnName=Toyako&cityId=50390&hotelId=711304&Allianceid=7364995&SID=277926202' }
        ];

        let activeRegion = 'tokyo', checkIn = '', checkOut = '';
        function initDates() {
            const d1 = new Date(); d1.setDate(d1.getDate()+1); const d2 = new Date(); d2.setDate(d2.getDate()+2);
            checkIn = d1.toISOString().split('T')[0]; checkOut = d2.toISOString().split('T')[0];
        }
        initDates();

        function renderHotelUI() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = `
                <div class="bg-white p-3 rounded-xl shadow-sm border mb-4 flex items-center justify-between">
                    <div class="flex-1 grid grid-cols-2 gap-2 text-xs">
                        <input type="date" id="in" value="${checkIn}" class="p-2 border rounded">
                        <input type="date" id="out" value="${checkOut}" class="p-2 border rounded">
                    </div>
                    <button onclick="doSearch()" class="ml-2 bg-orange-500 text-white p-3 rounded-lg"><i class="fas fa-search"></i></button>
                </div>
                <div class="grid grid-cols-4 gap-2 mb-4">
                    ${['tokyo','osaka','fukuoka','sapporo'].map(r => `<button onclick="activeRegion='${r}';renderHotelUI()" class="p-2 text-[10px] font-bold border rounded ${activeRegion==r?'bg-orange-100 border-orange-500':'border-gray-200'}">${r.toUpperCase()}</button>`).join('')}
                </div>
                <div id="list" class="space-y-3"></div>
            `;
            doSearch();
        }

        function doSearch() {
            checkIn = document.getElementById('in').value;
            checkOut = document.getElementById('out').value;
            const list = document.getElementById('list');
            list.innerHTML = baseHotelsData.filter(h => h.region == activeRegion).map(item => {
                let url = new URL(item.url);
                url.searchParams.set('checkIn', checkIn);
                url.searchParams.set('checkOut', checkOut);
                return `
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <div class="font-bold mb-2">${item.name}</div>
                        <a href="${url.toString()}" target="_blank" class="block w-full text-center bg-blue-600 text-white py-2 rounded-lg text-sm">前往查價</a>
                    </div>
                `;
            }).join('');
        }
        function switchTab(t) { t=='hotel'?renderHotelUI():location.reload(); }
        renderHotelUI();
    </script>
</body>
</html>
