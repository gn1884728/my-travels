<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的生活整合中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 font-bold text-center">我的整合中心</header>
    
    <main id="content" class="flex-1 p-4 overflow-y-auto">載入中...</main>

    <footer class="bg-white border-t flex justify-around p-4">
        <button onclick="view('6')" class="font-bold">優惠</button>
        <button onclick="viewNews()" class="font-bold">新聞</button>
        <button onclick="viewLounge()" class="font-bold">貴賓室</button>
    </footer>

    <script>
        let data = {};
        // 載入資料並增加快取控制
        fetch('data.json?t=' + Date.now())
            .then(r => r.json())
            .then(d => { data = d; view('6'); })
            .catch(() => document.getElementById('content').innerHTML = "資料讀取失敗，請檢查格式");

        function view(month) {
            const list = data[month]?.food || [];
            document.getElementById('content').innerHTML = list.map(i => `<div class="bg-white p-3 mb-2 rounded shadow">${i.title}</div>`).join('');
        }

        function viewNews() {
            document.getElementById('content').innerHTML = (data.news || []).map(i => `<div class="bg-white p-3 mb-2 rounded shadow">${i.title}</div>`).join('');
        }

        function viewLounge() {
            const l = data.lounge || {};
            document.getElementById('content').innerHTML = `
                <select id="c" onchange="upA()" class="w-full p-2 border rounded"><option value="">選國家</option>${Object.keys(l).map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                <select id="a" onchange="showI()" class="w-full p-2 border rounded mt-2"><option value="">選機場</option></select>
                <div id="imgZone" class="mt-4"></div>
            `;
        }

        function upA() {
            const c = document.getElementById('c').value;
            const a = document.getElementById('a');
            a.innerHTML = Object.keys(data.lounge[c] || {}).map(i => `<option value="${i}">${i}</option>`).join('');
        }

        function showI() {
            const c = document.getElementById('c').value;
            const a = document.getElementById('a').value;
            document.getElementById('imgZone').innerHTML = `<img src="${data.lounge[c][a]}" class="w-full rounded">`;
        }
    </script>
</body>
</html>
