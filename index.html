<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>整合中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">
    
    <header class="bg-blue-600 text-white p-5 text-xl font-bold text-center shadow-md">
        生活優惠中心
    </header>

    <main id="app" class="flex-1 p-4 overflow-y-auto pb-32 w-full max-w-lg mx-auto"></main>

    <nav class="bg-white border-t flex justify-around p-4 shadow-2xl fixed bottom-0 w-full max-w-lg mx-auto">
        <button onclick="render('food')" class="flex flex-col items-center text-sm"><i class="fas fa-gift text-xl mb-1"></i>優惠</button>
        <button onclick="render('travel')" class="flex flex-col items-center text-sm"><i class="fas fa-map-marked-alt text-xl mb-1"></i>行程</button>
        <button onclick="render('lounge')" class="flex flex-col items-center text-sm"><i class="fas fa-couch text-xl mb-1"></i>貴賓室</button>
    </nav>

    <script>
        let d = {};
        fetch('data.json?t='+Date.now()).then(r=>r.json()).then(res=>{ d=res; render('food'); });

        function render(tab) {
            const app = document.getElementById('app');
            // 此處保留之前的渲染邏輯，但增加響應式 class
            if(tab === 'food') {
                app.innerHTML = d.food.map(i => `
                    <div class="bg-white p-5 rounded-2xl shadow mb-4">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="${i.color} text-white px-3 py-1 rounded-full text-xs font-bold">${i.brand}</div>
                            <h3 class="font-bold text-lg">${i.title}</h3>
                        </div>
                        <p class="text-gray-500 mb-4 text-sm">${i.time}</p>
                        <div class="flex gap-3">
                            <a href="${i.url}" class="bg-blue-600 text-white p-3 rounded-xl flex-1 text-center font-bold">前往優惠</a>
                            <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=${i.title}" class="bg-gray-200 p-3 rounded-xl px-6 font-bold">+日曆</a>
                        </div>
                    </div>`).join('');
            }
            // ... (其餘邏輯維持不變)
        }
    </script>
</body>
</html>
