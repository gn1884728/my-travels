<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的優惠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col max-w-md mx-auto shadow-2xl">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold">我的優惠</h1>
            <select id="monthSelect" onchange="renderActiveTab()" class="text-gray-800 text-sm p-1 rounded">
                <option value="6" selected>6 月</option>
            </select>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24 no-scrollbar" id="main-content">
        <div id="dynamic-content" class="space-y-4"></div>
    </main>

    <nav class="bg-white border-t flex justify-around p-3 shadow-lg z-50">
        <button onclick="switchTab('food')" class="tab-btn flex flex-col items-center text-blue-600"><i class="fas fa-utensils"></i><span class="text-[10px]">美食</span></button>
        <button onclick="switchTab('life')" class="tab-btn flex flex-col items-center text-gray-400"><i class="fas fa-shopping-bag"></i><span class="text-[10px]">生活</span></button>
        <button onclick="switchTab('travel')" class="tab-btn flex flex-col items-center text-gray-400"><i class="fas fa-plane"></i><span class="text-[10px]">旅遊</span></button>
        <button onclick="switchTab('credit')" class="tab-btn flex flex-col items-center text-gray-400"><i class="fas fa-credit-card"></i><span class="text-[10px]">信用卡</span></button>
    </nav>

    <script>
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/gn1884728/my-travels/refs/heads/main/data.json';
        let globalData = null;
        let currentTab = 'food';

        async function fetchGitHubData() {
            const res = await fetch(`${GITHUB_RAW_URL}?t=${new Date().getTime()}`);
            globalData = await res.json();
            renderActiveTab();
        }

        function addToCalendar(title, time, url) {
            // 保持你原本的ICS生成邏輯
            alert("正在生成行事曆..."); 
            // 這裡貼上你原本那段複雜的 ICS 函式即可
        }

        function renderActiveTab() {
            if (!globalData) return;
            const month = document.getElementById('monthSelect').value;
            const items = globalData[month]?.[currentTab] || [];
            const container = document.getElementById('dynamic-content');
            
            container.innerHTML = items.map(item => {
                // 恢復品牌識別顏色邏輯
                let color = item.brand === 'KLOOK' ? 'bg-orange-600' : 'bg-blue-800';
                return `
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <div class="flex justify-between mb-2">
                        <span class="${color} text-white text-[10px] px-2 py-0.5 rounded">${item.brand}</span>
                        <span class="text-xs text-blue-600 font-bold">${item.time}</span>
                    </div>
                    <h3 class="font-bold text-gray-900">${item.title}</h3>
                    <p class="text-gray-500 text-xs mb-3">${item.desc}</p>
                    <div class="flex gap-2">
                        <a href="${item.url}" target="_blank" class="flex-1 bg-blue-50 text-blue-600 text-center py-2 rounded-lg font-bold text-xs">前往網頁</a>
                        <button onclick="addToCalendar('${item.title}','${item.time}','${item.url}')" class="bg-gray-100 px-3 rounded-lg text-orange-600"><i class="fa-solid fa-calendar-plus"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('text-blue-600', b.getAttribute('onclick').includes(tab)));
            renderActiveTab();
        }

        fetchGitHubData();
    </script>
</body>
</html>
