        ];

        // 🗺️ 區域對照表 (新增了新宿)
        const zonesData = {
            kanto: {
                name: '關東',
                regions: [
                    { id: 'tokyo', name: '東京', icon: 'fa-tower-observation' },
                    { id: 'shinjuku', name: '新宿', icon: 'fa-building' } // 🌟 這裡新增了新宿區！
                ]
            },
            kansai: {
                name: '關西',
                regions: [{ id: 'osaka', name: '大阪', icon: 'fa-chess-castle' }]
            },
            kyushu: {
                name: '九州',
                regions: [{ id: 'fukuoka', name: '福岡', icon: 'fa-bowl-food' }]
            },
            hokkaido: {
                name: '北海道',
                regions: [{ id: 'sapporo', name: '札幌', icon: 'fa-snowflake' }]
            }
        };

        let activeZone = 'kanto';
        let activeHotelRegion = 'tokyo';
        let hotelMaxPrice = 15000;
        let checkInDate = '';
        let checkOutDate = '';
        let tempCheckIn = '';
        let tempCheckOut = '';

        function initDates() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dayAfter = new Date();
            dayAfter.setDate(dayAfter.getDate() + 2);
            
            checkInDate = tomorrow.toISOString().split('T')[0];
            checkOutDate = dayAfter.toISOString().split('T')[0];
            tempCheckIn = checkInDate;
            tempCheckOut = checkOutDate;
        }

        // ==========================================
        // 🔄 UI 與邏輯處理
        // ==========================================
        function updateNoticeBanner() {
            const banner = document.getElementById('notice-banner');
            const text = document.getElementById('notice-text');
            if (currentTab === 'hotel') {
                banner.className = "w-full text-xs py-1.5 px-2.5 rounded-md font-bold flex items-center shadow-inner bg-blue-100 text-blue-800";
                text.innerText = "📅 請選擇住宿日期，調整完成後點擊「套用」！";
                return;
            }
            
            const date = new Date().getDate();
            if (date === 1) {
                banner.className = "w-full text-xs py-1.5 px-2.5 rounded-md font-bold flex items-center shadow-inner bg-red-100 text-red-600 animate-pulse-slow";
                text.innerText = "🚨 搶好康決戰日！今天就是1號，記得去登入優惠！";
            } else {
                banner.className = "w-full text-xs py-1.5 px-2.5 rounded-md font-medium flex items-center shadow-inner bg-blue-500 text-white";
                text.innerText = "💡 隨手點擊加入行事曆，優惠不漏接！";
            }
        }

        function renderHotelUI() {
            const container = document.getElementById('dynamic-content');
            
            // 產生四大分區按鈕
            let zoneTabs = Object.keys(zonesData).map(zKey => `
                <button onclick="switchZone('${zKey}')" class="pb-2 px-1 border-b-2 font-bold transition-all ${activeZone === zKey ? 'border-orange-500 text-orange-600' : 'border-gray-200 text-gray-400'}">
                    ${zonesData[zKey].name}
                </button>
            `).join('');

            // 產生該分區的次區域按鈕 (如東京、新宿)
            let regionBtns = zonesData[activeZone].regions.map(r => `
                <button onclick="setHotelRegion('${r.id}')" class="flex flex-col items-center justify-center py-3 rounded-xl border-2 transition-all active:scale-95 ${activeHotelRegion === r.id ? 'border-orange-500 bg-orange-50 text-orange-600 shadow-sm' : 'border-gray-100 bg-white text-gray-400'}">

                    <span class="text-[11px] font-bold tracking-wide">${r.name}區</span>
                </button>
            `).join('');

            container.innerHTML = `
                <div class="flex justify-between items-end border-b border-gray-100 mb-3 space-x-4">
                    ${zoneTabs}
                </div>
                
                <div class="grid grid-cols-4 gap-2 mb-4">

                </div>

                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 mb-0.5">退房日期</label>
                                <input type="date" id="checkOutInput" value="${tempCheckOut}" onchange="handleTempDateChange('out', this.value)" class="w-full text-[11px] font-bold bg-gray-50 border border-gray-200 rounded-lg p-1.5 text-gray-700 focus:outline-none focus:border-blue-400">
                            </div>
                        </div>
                        <button onclick="executeHotelSearch()" class="bg-orange-500 hover:bg-orange-600 text-white font-black text-xs px-4 py-2.5 rounded-lg shadow-md transition-colors h-[42px] mt-[18px]">
                            套用
                        </button>
                    </div>

                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-gray-700 text-sm">篩選飯店等級 <span class="text-xs text-gray-400 font-normal">(平日起價)</span></span>
                        <span class="font-black text-blue-600 text-lg">NT$ <span id="priceDisplay">${hotelMaxPrice.toLocaleString()}</span> 內</span>
                    </div>
                    <input type="range" min="1500" max="15000" step="500" value="${hotelMaxPrice}" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="updateHotelPrice(this.value)">

        function switchZone(zoneKey) {
            activeZone = zoneKey;
            activeHotelRegion = zonesData[zoneKey].regions[0].id;
            renderHotelUI();
        }

        function setHotelRegion(regionId) {
            activeHotelRegion = regionId;
            renderHotelUI();
        }

        function updateHotelPrice(val) {
            hotelMaxPrice = parseInt(val);
            document.getElementById('priceDisplay').innerText = hotelMaxPrice.toLocaleString();
            renderHotelList();
        }

        function handleTempDateChange(type, value) {
            if (type === 'in') {
                tempCheckIn = value;
                let d = new Date(value);
                d.setDate(d.getDate() + 1);
                tempCheckOut = d.toISOString().split('T')[0];
                document.getElementById('checkOutInput').value = tempCheckOut;
            } else {
                tempCheckOut = value;
            }
        }

        function executeHotelSearch() {
            checkInDate = tempCheckIn;
            checkOutDate = tempCheckOut;
            renderHotelList();
        }

        function renderHotelList() {
            const listContainer = document.getElementById('hotelListContainer');
            let filteredHotels = baseHotelsData.filter(h => h.region === activeHotelRegion && h.basePrice <= hotelMaxPrice);
            filteredHotels.sort((a, b) => a.basePrice - b.basePrice);

            if (filteredHotels.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-400"><p class="text-sm">此預算內暫無飯店</p></div>`;
                return;
            }

            listContainer.innerHTML = filteredHotels.map(item => {
                // 巧妙處理 Trip.com 長網址，動態更換入住/退房日期
                let finalUrl = item.url;
                try {
                    let urlObj = new URL(item.url);
                    const keysToDelete = [];
                    for (const key of urlObj.searchParams.keys()) {
                        if (key.toLowerCase() === 'checkin' || key.toLowerCase() === 'checkout') {
                            keysToDelete.push(key);
                        }
                    }
                    keysToDelete.forEach(k => urlObj.searchParams.delete(k));
                    urlObj.searchParams.set('checkIn', checkInDate);
                    urlObj.searchParams.set('checkOut', checkOutDate);
                    finalUrl = urlObj.toString();
                } catch(e) {
                    finalUrl = item.url + (item.url.includes('?') ? '&' : '?') + `checkIn=${checkInDate}&checkOut=${checkOutDate}`;
                }

                const safeName = item.name.replace(/['"]/g, '');
                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-3">
                            <span class="bg-blue-800 text-white text-[11px] font-black tracking-wider px-2 py-0.5 rounded">${item.platform}</span>
                            <span class="text-xs font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded-md">平日參考起價 <span class="text-blue-600 ml-1 font-black">NT$ ${item.basePrice.toLocaleString()}</span></span>
                        </div>
                        <h3 class="font-bold text-gray-900 text-base mb-4"><i class="fas fa-map-marker-alt text-orange-500 mr-1.5"></i>${item.name}</h3>
                        <a href="${finalUrl}" target="_blank" onclick="trackAffiliateClick('${item.platform}', '${safeName}')" class="w-full inline-flex justify-center items-center bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold text-sm py-2.5 rounded-xl border border-blue-200 transition-colors">
                            查詢即時房價與空房
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        // ==========================================
        // 📡 通用功能與行事曆
        // ==========================================
        function addToCalendar(title, timeStr, url) {
            let hour = 10, minute = 30;
            if (timeStr.includes("09:00")) { hour = 9; minute = 0; }
            
            const now = new Date();
            let nextMonth = now.getMonth() + 1;
            let year = now.getFullYear();
            if (now.getDate() > 1 || (now.getDate() === 1 && now.getHours() >= hour)) {
                nextMonth += 1;
                if (nextMonth > 12) { nextMonth = 1; year += 1; }
            }
            const monthStr = String(nextMonth).padStart(2, '0');
            const startStr = `${year}${monthStr}01T${String(hour).padStart(2, '0')}${String(minute).padStart(2, '0')}00`;
            const endStr = `${year}${monthStr}01T${String(hour + 1).padStart(2, '0')}${String(minute).padStart(2, '0')}00`;
            
            const safeTitle = title.replace(/<[^>]*>/g, '').replace(/['"]/g, '');
            const icsContent = [
                "BEGIN:VCALENDAR", "VERSION:2.0", "BEGIN:VEVENT",
                `DTSTART;TZID=Asia/Taipei:${startStr}`, `DTEND;TZID=Asia/Taipei:${endStr}`,
                `SUMMARY:${safeTitle}`, `DESCRIPTION:優惠連結：${url}`,
                "BEGIN:VALARM", "TRIGGER:-PT10M", "ACTION:DISPLAY", "DESCRIPTION:提醒", "END:VALARM",
                "END:VEVENT", "END:VCALENDAR"
            ].join("\n");
            
            gtag('event', 'add_to_calendar', { 'event_category': 'Engagement', 'event_label': safeTitle });
            
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${safeTitle.split('】').pop().split('（')[0]}_優惠提醒.ics`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function trackAffiliateClick(brand, title) {
            const safeTitle = title.replace(/<[^>]*>/g, '').replace(/['"]/g, '');
            gtag('event', 'click_affiliate', { 'brand': brand, 'discount_title': safeTitle });
        }

        function trackMonthChange() { renderActiveTab(); }

        // ==========================================
        // 🌐 其他優惠資料撈取
        // ==========================================
        async function fetchGitHubData() {
            try {
                const response = await fetch(`${GITHUB_RAW_URL}?t=${new Date().getTime()}`);
                globalData = await response.json();
                renderActiveTab();
            } catch (error) {
                document.getElementById('dynamic-content').innerHTML = `<div class="text-center py-10 text-red-500"><p>連結遺失，請重新整理</p></div>`;
            }
        }

        function renderActiveTab() {
            if (currentTab === 'hotel') return;
            if (!globalData) return;
            
            const selectedMonth = document.getElementById('monthSelect').value;
            const container = document.getElementById('dynamic-content');
            
            if (!globalData[selectedMonth] || !globalData[selectedMonth][currentTab] || globalData[selectedMonth][currentTab].length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400"><p class="text-sm">${selectedMonth} 月份暫無活動</p></div>`;
                return;
            }
            
            const items = [...globalData[selectedMonth][currentTab]];
            container.innerHTML = items.map((item) => {
                let badgeColor = item.brand.toUpperCase() === 'JCB' ? 'bg-red-500' : 
                                 item.brand.toUpperCase() === 'VISA' ? 'bg-blue-800' : 
                                 item.brand.toUpperCase() === 'MASTERCARD' ? 'bg-orange-500' : 'bg-gray-600';
                const cleanTitle = item.title.replace(/<[^>]*>/g, '').replace(/['"]/g, '');
                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-3">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2.5">
                            <span class="${badgeColor} text-white text-[11px] font-black tracking-wider px-2 py-0.5 rounded">${item.brand}</span>
                            <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">${item.time}</span>
                        </div>
                        <h3 class="font-bold text-gray-900 text-base mb-1">${item.title}</h3>
                        <p class="text-gray-500 text-xs mb-4">${item.desc}</p>
                        <div class="flex space-x-2 w-full">
                            <a href="${item.url}" target="_blank" onclick="trackAffiliateClick('${item.brand}', '${cleanTitle}')" class="flex-1 inline-flex justify-center items-center bg-blue-50 text-blue-600 font-bold text-xs py-2.5 rounded-xl border border-blue-200">前往官方網頁</a>
                            <button onclick="addToCalendar('${cleanTitle}', '${item.time}', '${item.url}')" class="bg-gray-50 text-orange-600 font-bold text-xs px-3.5 rounded-xl border border-gray-200"><i class="fa-solid fa-calendar-plus text-sm"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function switchTab(tabName) {
            currentTab = tabName;
            
            // 重置所有按鈕樣式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('text-blue-600', 'font-semibold');
                btn.classList.add('text-gray-400');
            });
            
            const hotelBtn = document.getElementById('tab-hotel');
            if (tabName === 'hotel') {
                hotelBtn.classList.remove('bg-blue-600');
                hotelBtn.classList.add('bg-orange-500');
            } else {
                hotelBtn.classList.remove('bg-orange-500');
                hotelBtn.classList.add('bg-blue-600');
                const activeBtn = document.getElementById(`tab-${tabName}`);
                if(activeBtn) {
                    activeBtn.classList.remove('text-gray-400');
                    activeBtn.classList.add('text-blue-600', 'font-semibold');
                }
            }
            
            const monthSelector = document.getElementById('monthSelectorContainer');
            if(tabName === 'hotel') {
                monthSelector.style.display = 'none';
                updateNoticeBanner();
                renderHotelUI();
            } else {
                monthSelector.style.display = 'block';
                updateNoticeBanner();
                renderActiveTab();
            }
        }

        // 初始化
        initDates();
        switchTab('hotel');
        fetchGitHubData();

    </script>
</body>
</html>
