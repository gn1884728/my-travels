<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 泰國避暑之旅</title>
    <style>
        /* ... 保留您原有的所有樣式 ... */
        /* 新增的天氣與匯率樣式 */
        .weather-btn { background: #059669; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; text-decoration: none; margin-left: 8px; }
        .currency-card { background: #f0fdf4; border-radius: 12px; padding: 16px; margin: 10px 0; border: 1px solid #d1fae5; }
        .safe-hidden-panel { display: none; margin-top: 10px; padding: 14px; background-color: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 8px; color: #64748b; font-size: 14px; line-height: 1.8; font-weight: bold; }
    </style>
</head>
<body>
<div class="date-header">
    8/22 (六) | 啟程 
    <a href="https://www.accuweather.com/en/th/bangkok/318849/weather-forecast/318849" target="_blank" class="weather-btn">⛅ 天氣預報</a>
</div>

<div class="card">
    <div onclick="toggleSafePanel()" style="color: #059669; cursor: pointer; font-weight: bold; padding: 10px 0; border-bottom: 1px solid #e2e8f0;">過敏提示</div>
    <div id="safe-panel" class="safe-hidden-panel">
        • ❌ 絕對不可吃：牛肉、螃蟹、泰國蝦（大頭蝦）、胡蘿蔔。<br>
        • ✅ 安全可享用：海水草蝦、白蝦、小卷（透抽 OK！）、雞肉、魚肉、原型蔬菜。
    </div>
</div>

<div class="currency-card">
    <div class="event">💱 即時匯率 (THB ➔ TWD)</div>
    <input type="number" id="calc-thb" placeholder="฿ 輸入泰銖" oninput="convertCurrency()" style="width: 40%; padding: 8px;">
    <span style="font-weight:bold;">=</span>
    <input type="text" id="twdResult" placeholder="台幣" readonly style="width: 30%; padding: 8px;">
</div>

<script>
    // 匯率切換邏輯
    function convertCurrency() {
        const thb = document.getElementById('calc-thb').value;
        const rate = 0.9; // 可依實際匯率隨時調整
        document.getElementById('twdResult').value = thb ? Math.round(thb * rate) + " NT$" : "";
    }

    // 過敏原區塊開關邏輯
    function toggleSafePanel() {
        const panel = document.getElementById('safe-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }
    
    // ... (保留您原有的其他所有 JS 邏輯)
</script>
</body>
</html>
