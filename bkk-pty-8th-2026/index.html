<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰國旅遊行程管理</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>泰國行程總覽 (8/22 - 8/26)</h1>
        <table id="itineraryTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>時間</th>
                    <th>行程內容</th>
                    <th>備註</th>
                </tr>
            </thead>
            <tbody>
 </tbody>
        </table>
    </div>

    <script>
        const itineraryData = [
            { date: "8/22", time: "上午", activity: "抵達曼谷/轉機往 Pattaya", remark: "BR201 班機" },
            { date: "8/22", time: "下午", activity: "入住 Pattaya 飯店", remark: "IHG 體系確認" },
            { date: "8/23", time: "全天", activity: "Pattaya 水上活動/市區觀光", remark: "-" },
            { date: "8/24", time: "上午", activity: "前往曼谷", remark: "包車預訂" },
            { date: "8/24", time: "下午", activity: "曼谷飯店辦理入住", remark: "近 BTS 站" },
            { date: "8/25", time: "全天", activity: "曼谷自由行/購物", remark: "折扣資訊備用" },
            { date: "8/26", time: "上午", activity: "最後採購", remark: "-" },
            { date: "8/26", time: "下午", activity: "前往機場", remark: "BR068 班機" }
        ];

        const tbody = document.querySelector("#itineraryTable tbody");
        itineraryData.forEach(item => {
            let row = `<tr>
                <td>${item.date}</td>
                <td>${item.time}</td>
                <td>${item.activity}</td>
                <td>${item.remark}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    </script>
    <footer style="margin-top: 40px; text-align: center; color: #777; font-size: 0.9em;">
        <p>泰國行程管理系統 | 您的貼身差旅管家</p>
    </footer>
</body>
</html>               ```
